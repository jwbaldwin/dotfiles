"$schema" = "https://docs.jj-vcs.dev/latest/config-schema.json"

[user]
name = "jwbaldwin"
email = "jwbaldwin3@gmail.com"

[ui]
default-command = "log"
pager = "delta"
diff-formatter = ":git"
diff-editor = ["nvim", "-c", "DiffEditor $left $right $output"]
conflict-marker-style = "diff"
show-cryptographic-signatures = false

[aliases]
tug = ["bookmark", "advance"]
log-recent = ["log", "-r", "default() & recent()"]
gf = ["git", "fetch"]
gp = ["git", "push"]
rb = ["rebase", "--onto", "trunk()"]
tp = ["util","exec","--","sh","-c","jj tug \"$@\" && jj git push","sh"]

[revset-aliases]
'recent()' = 'committer_date(after:"1 month ago")'
'closest_bookmark(to)' = 'heads(::to & bookmarks())'
'closest_pushable(to)' = 'heads(::to & mutable() & ~description(exact:"") & (~empty() | merges()))'

[revsets]
bookmark-advance-to = 'closest_pushable(@)'

[git]

[remotes.origin]
auto-track-bookmarks = "*"

[remotes.github]
auto-track-bookmarks = "*"

[templates]
git_push_bookmark = '"jb/push-" ++ change_id.short()'
